<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RearMC Network | Home</title>
    <link rel="stylesheet" href="style.css?v=2.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 50% 0%, #151c2d 0%, #080b12 80%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .home-container {
            max-width: 1200px;
            width: 90%;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .server-logo-main {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 77, 77, 0.4));
        }

        .home-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, #ff4d4d 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-sub {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .nav-card:hover {
            background: rgba(255, 77, 77, 0.08);
            border-color: rgba(255, 77, 77, 0.3);
            transform: translateY(-12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .nav-card.active:hover {
            border-color: #ff4d4d;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .nav-card:hover .card-icon {
            transform: scale(1.2);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-status {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
        }

        .active .card-status {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
        }

        .coming-soon .card-status {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .particles {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 77, 77, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 77, 77, 0.05) 0%, transparent 40%);
        }

        /* Coming Soon Modal */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.4s ease;
            opacity: 0;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <div class="home-container">
        <img src="https://minecraft-avatar.com/avatar/steve/120.png" alt="Logo" class="server-logo-main">
        <h1 class="home-title">REARMC NETWORK</h1>
        <p class="home-sub">Elite PvP Experience</p>

        <div class="nav-grid">
            <div class="nav-card coming-soon" onclick="showSoon('Store')">
                <div class="card-icon">🛒</div>
                <div class="card-title">STORE</div>
                <div class="card-status">Coming Soon</div>
            </div>

            <a href="tiers.html" class="nav-card active">
                <div class="card-icon">🏆</div>
                <div class="card-title">TIERLIST</div>
                <div class="card-status">Live Now</div>
            </a>

            <div class="nav-card coming-soon" onclick="showSoon('Discord')">
                <div class="card-icon">💬</div>
                <div class="card-title">DISCORD</div>
                <div class="card-status">Coming Soon</div>
            </div>

            <div class="nav-card coming-soon" onclick="showSoon('More')">
                <div class="card-icon">✨</div>
                <div class="card-title">MORE</div>
                <div class="card-status">Coming Soon</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">This section is coming soon! ✨</div>

    <script>
        function showSoon(name) {
            const toast = document.getElementById('toast');
            toast.textContent = `${name} is coming soon! ✨`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
