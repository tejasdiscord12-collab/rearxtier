<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REARMC | ELITE PORTAL</title>
    <link rel="stylesheet" href="style.css?v=3.5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --neon: #ff003c;
            --neon-dim: rgba(255, 0, 60, 0.4);
            --gold: #fbbf24;
            --bg-deep: #020305;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cinematic ULTRA Background */
        .viewport-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: linear-gradient(rgba(2, 3, 5, 0.2), rgba(2, 3, 5, 0.9)), url('hero-bg.png');
            background-size: cover;
            background-position: center;
            filter: saturate(1.2) contrast(1.1);
            animation: kenFlow 60s linear infinite alternate;
        }

        @keyframes kenFlow {
            0% { transform: scale(1) translate(0,0); }
            100% { transform: scale(1.1) translate(-2%, -1%); }
        }

        /* Abstract Glow Effects */
        .bloom {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--neon-dim) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0.2;
            z-index: -1;
            animation: breathe 10s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            from { transform: scale(1); opacity: 0.15; }
            to { transform: scale(1.3); opacity: 0.25; }
        }

        /* Portal Content Core */
        .portal-wrapper {
            position: relative;
            width: 100%;
            max-width: 1300px;
            padding: 40px;
            text-align: center;
            perspective: 1500px;
            z-index: 100;
        }

        .portal-logo-wrap {
            margin-bottom: 80px;
            animation: heroicEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .hero-logo {
            width: 380px;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.8)) drop-shadow(0 0 20px var(--neon-dim));
            transition: all 0.6s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .hero-logo:hover {
            transform: scale(1.05) translateZ(50px);
            filter: drop-shadow(0 0 80px var(--neon-dim));
        }

        .title-display {
            font-family: 'Syncopate', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.9;
        }

        .hero-tag {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--neon);
            margin-bottom: 60px;
            text-shadow: 0 0 20px var(--neon-dim);
        }

        /* ELITE ACTION MENU */
        .action-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            animation: menuReveal 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            animation-delay: 0.4s;
        }

        .action-btn {
            position: relative;
            height: 180px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            cursor: pointer;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon);
            transform: scaleX(0);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 -10px 20px var(--neon-dim);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--neon-dim);
            transform: translateY(-20px) rotateX(10deg);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .action-btn:hover::after { transform: scaleX(1); }

        .btn-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 8px;
            transition: all 0.4s ease;
        }

        .action-btn:hover .btn-label { letter-spacing: 6px; color: var(--neon); }

        .btn-desc {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        .action-btn i {
            display: none; /* User hates "L emojis", hiding icons to stay minimalist-Elite */
        }

        /* SPECIFIC FOR TIERS */
        .tier-btn {
            background: rgba(225, 0, 60, 0.05);
            border-color: rgba(225, 0, 60, 0.2);
        }
        .tier-btn .btn-desc { color: var(--gold); }

        /* Animations */
        @keyframes heroicEntry {
            from { opacity: 0; transform: scale(1.1) rotateX(-20deg) translateY(-40px); }
            to { opacity: 1; transform: scale(1) rotateX(0) translateY(0); }
        }

        @keyframes menuReveal {
            from { opacity: 0; transform: translateY(100px) rotateX(15deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* Systems */
        #portalNotice {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 18px 40px;
            border-radius: 100px;
            border: 1px solid var(--neon-dim);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1000;
            white-space: nowrap;
        }

        #portalNotice.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 900px) {
            .action-menu { grid-template-columns: 1fr 1fr; }
            .title-display { font-size: 4rem; letter-spacing: -6px; }
            .hero-logo { width: 260px; }
        }
    </style>
</head>
<body>
    <div class="viewport-bg"></div>
    <div class="bloom" style="top: -200px; left: -200px;"></div>
    <div class="bloom" style="bottom: -150px; right: -150px; animation-delay: -2s;"></div>

    <div class="portal-wrapper">
        <div class="portal-logo-wrap">
            <img src="logo.png" alt="RearMC Logo" class="hero-logo">
            <p class="hero-tag">Professional Practice Network</p>
        </div>

        <div class="action-menu">
            <div class="action-btn" onclick="openSystem('Store')">
                <span class="btn-label">STORE</span>
                <span class="btn-desc">OFFLINE</span>
            </div>

            <a href="tiers.html" class="action-btn tier-btn">
                <span class="btn-label">TIERS</span>
                <span class="btn-desc">LIVE ACCESS</span>
            </a>

            <div class="action-btn" onclick="openSystem('Discord')">
                <span class="btn-label">DISCORD</span>
                <span class="btn-desc">RESTRICTED</span>
            </div>

            <div class="action-btn" onclick="openSystem('Clips')">
                <span class="btn-label">CLIPS</span>
                <span class="btn-desc">COMING SOON</span>
            </div>
        </div>
    </div>

    <div id="portalNotice">Authorization required for this node.</div>

    <script>
        function openSystem(name) {
            const notice = document.getElementById('portalNotice');
            notice.textContent = `CRITICAL: ${name.toUpperCase()} DATA NODE IS CURRENTLY OFFLINE.`;
            notice.classList.add('show');
            setTimeout(() => notice.classList.remove('show'), 3500);
        }

        // Parallax Logo
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.hero-logo');
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            logo.style.transform = `translateX(${x}px) translateY(${y}px) rotateX(${-y}px) rotateY(${x}px)`;
        });
    </script>
</body>
</html>
