<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RearMC | The Final Apex</title>
    <link rel="stylesheet" href="style.css?v=5.5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fire: #ff003c; --fire-glow: rgba(255, 0, 60, 0.4); }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#080808; font-family:'Outfit', sans-serif; color:#fff; overflow:hidden; }
        .hero-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:url('hero-bg.png') center/cover no-repeat; z-index:-1; filter:brightness(0.3) blur(2px); animation:kenburns 40s infinite; }
        @keyframes kenburns { 0%{transform:scale(1);} 100%{transform:scale(1.1);} }
        .pixel-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%); z-index:0; }

        .top-nav { position:fixed; top:30px; left:0; width:100%; z-index:100; display:flex; justify-content:center; gap:50px; }
        .nav-link { text-decoration:none; color:#fff; font-weight:800; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem; opacity:0.6; transition:0.3s; }
        .nav-link:hover { opacity:1; color:var(--fire); }

        .hero-main { height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:10; }
        .hero-logo-box { position:relative; transition:0.1s; }
        .hero-logo { width:420px; filter:drop-shadow(0 0 30px var(--fire-glow)); }
        .logo-island { position:absolute; bottom:-50px; left:50%; transform:translateX(-50%); width:500px; height:120px; background:radial-gradient(ellipse at center, rgba(255,0,60,0.1) 0%, transparent 70%); z-index:1; }

        .side-stats { position:absolute; width:100%; top:50%; transform:translateY(-50%); display:flex; justify-content:space-between; padding:0 8%; pointer-events:none; }
        .stat-node { text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .stat-val { color:var(--fire); font-family:'Syncopate', sans-serif; font-weight:700; font-size:1.4rem; letter-spacing:1px; }
        .stat-label { font-weight:800; letter-spacing:4px; font-size:0.7rem; opacity:0.4; text-transform:uppercase; }
        .stat-icon { width:56px; height:56px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; display:flex; align-items:center; justify-content:center; border-radius:50%; box-shadow:0 0 20px rgba(0,0,0,0.5); pointer-events:auto; cursor:pointer; font-size:1.2rem; transition:0.3s; }
        .stat-icon:hover { background:var(--fire); box-shadow:0 0 30px var(--fire-glow); border-color:transparent; }

        .bottom-cta { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); display:flex; gap:25px; }
        .btn-cta { padding:20px 50px; border-radius:8px; border:none; font-family:'Outfit', sans-serif; font-weight:900; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:0.3s; border: 1px solid transparent; }
        .btn-primary { background:var(--fire); color:#fff; box-shadow:0 10px 30px var(--fire-glow); }
        .btn-outline { background:rgba(255,255,255,0.02); color:#fff; border:1px solid rgba(255,255,255,0.1); }
        .btn-cta:hover { transform:translateY(-8px); filter:brightness(1.2); }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="pixel-mask"></div>

    <nav class="top-nav">
        <a href="#" class="nav-link">Home</a>
        <a href="tiers.html" class="nav-link">Tiers</a>
        <a href="#" class="nav-link">Discord</a>
        <a href="#" class="nav-link">Store</a>
    </nav>

    <main class="hero-main">
        <div class="side-stats">
            <div class="stat-node">
                <span class="stat-val">342 ONLINE</span>
                <span class="stat-label">PLAY.REARMC.FUN</span>
                <div class="stat-icon" onclick="copyIP()"><i class="fa-solid fa-play"></i></div>
            </div>
            
            <div class="stat-node">
                <span class="stat-val">2,104 USERS</span>
                <span class="stat-label">COMMUNITY NODE</span>
                <div class="stat-icon"><i class="fa-brands fa-discord"></i></div>
            </div>
        </div>

        <div class="hero-logo-box" id="logoBox">
            <img src="logo.png" alt="RearMC Logo" class="hero-logo">
            <div class="logo-island"></div>
        </div>
    </main>

    <div class="bottom-cta">
        <button class="btn-cta btn-primary" onclick="window.location.href='tiers.html'">VIEW TIERS</button>
        <button class="btn-cta btn-outline">NETWORK MAP</button>
    </div>

    <script>
        const logoBox = document.getElementById('logoBox');
        document.addEventListener('mousemove', (e) => {
            const dx = (window.innerWidth / 2 - e.pageX) / 45;
            const dy = (window.innerHeight / 2 - e.pageY) / 45;
            logoBox.style.transform = `translateX(${-dx}px) translateY(${-dy}px)`;
        });

        function copyIP() {
            navigator.clipboard.writeText('play.rearmc.fun');
            alert('IP Copied: play.rearmc.fun');
        }
    </script>
</body>
</html>
