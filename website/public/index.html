<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RearMC | The Final Apex</title>
    <link rel="stylesheet" href="style.css?v=6.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fire: #ff003c; --fire-glow: rgba(255, 0, 60, 0.4); }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#080808; font-family:'Outfit', sans-serif; color:#fff; overflow:hidden; }
        .hero-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:url('hero-bg.png') center/cover no-repeat; z-index:-1; filter:brightness(0.3) blur(2px); animation:kenburns 40s infinite; }
        @keyframes kenburns { 0%{transform:scale(1);} 100%{transform:scale(1.1);} }
        .pixel-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%); z-index:0; }

        .hero-main { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:10; }
        .hero-logo { width:350px; filter:drop-shadow(0 0 30px var(--fire-glow)); margin-bottom:20px; transition:0.3s; }
        .hero-title { font-family:'Syncopate', sans-serif; font-size:6rem; margin:0; letter-spacing:-3px; font-weight:700; }
        .hero-tag { font-size:1rem; letter-spacing:10px; color:var(--fire); font-weight:300; text-transform:uppercase; margin-bottom:40px; }

        .grid-nav { display:flex; gap:20px; margin-top:50px; }
        .nav-card { padding:30px 60px; background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:0.4s; text-decoration:none; color:#fff; text-align:center; min-width:180px; }
        .nav-card:hover { transform:translateY(-10px); border-color:var(--fire); box-shadow:0 15px 40px var(--fire-glow); background:rgba(255,0,60,0.05); }
        .nav-card.active { border-color:var(--fire); background:rgba(255,0,60,0.1); }
        .card-main { display:block; font-size:1.8rem; font-weight:900; letter-spacing:2px; }
        .card-sub { display:block; font-size:0.7rem; font-weight:800; letter-spacing:1px; color:#888; margin-top:5px; }

        #alertBox { position:fixed; bottom:40px; background:rgba(255,0,60,0.9); padding:15px 30px; font-weight:900; letter-spacing:2px; border-radius:10px; opacity:0; transform:translateY(20px); transition:0.5s; }
        #alertBox.show { opacity:1; transform:translateY(0); }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="pixel-mask"></div>

    <main class="hero-main">
        <img src="logo.png" alt="RearMC Logo" class="hero-logo" id="mainLogo">
        <h1 class="hero-title">REARMC</h1>
        <p class="hero-tag">THE FINAL APEX</p>

        <div class="grid-nav">
            <div class="nav-card" onclick="openNode('Store')">
                <span class="card-main">STORE</span>
                <span class="card-sub">Maintenance</span>
            </div>
            <a href="tiers.html" class="nav-card active">
                <span class="card-main">TIERS</span>
                <span class="card-sub" style="color:#00ff88">LIVE ENTRY</span>
            </a>
            <div class="nav-card" onclick="openNode('Discord')">
                <span class="card-main">SOCIAL</span>
                <span class="card-sub">Encrypted</span>
            </div>
        </div>
    </main>

    <div id="alertBox">NODE UNAVAILABLE</div>

    <script>
        const logo = document.getElementById('mainLogo');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            logo.style.transform = `translateX(${-x}px) translateY(${-y}px) rotateX(${-y}px) rotateY(${x}px)`;
        });

        function openNode(node) {
            const box = document.getElementById('alertBox');
            box.textContent = `${node.toUpperCase()} SYSTEM NODE IS CURRENTLY ENCRYPTED.`;
            box.show();
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
