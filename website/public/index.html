<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RearMC | The Final Apex</title>
    <link rel="stylesheet" href="style.css?v=7.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff003c; --bg: #0a0a0b; --border: rgba(255,255,255,0.08); }
        body, html { margin:0; padding:0; width:100%; height:100%; background:var(--bg); font-family:'Outfit', sans-serif; color:#fff; overflow:hidden; }
        .hero-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:url('hero-bg.png') center/cover no-repeat; z-index:-1; filter:brightness(0.4); }
        .hero-main { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:10; }
        .hero-logo { width:300px; filter:drop-shadow(0 0 20px rgba(255,0,60,0.3)); margin-bottom:20px; }
        .grid-nav { display:flex; gap:20px; margin-top:50px; }
        .nav-card { padding:30px 60px; background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:0.3s; text-decoration:none; color:#fff; text-align:center; min-width:180px; }
        .nav-card:hover { transform:translateY(-10px); border-color:var(--primary); }
        .card-main { display:block; font-size:1.8rem; font-weight:900; letter-spacing:2px; }
        .card-sub { display:block; font-size:0.7rem; color:#888; margin-top:5px; }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <main class="hero-main">
        <img src="logo.png" alt="RearMC Logo" class="hero-logo">
        <h1 style="font-size:4rem; margin:0; font-weight:900;">REARMC</h1>
        <p style="font-size:1rem; letter-spacing:10px; color:var(--primary); font-weight:800; text-transform:uppercase;">THE FINAL APEX</p>

        <div class="grid-nav">
            <div class="nav-card" onclick="alert('Store Node Encrypted')">
                <span class="card-main">STORE</span>
                <span class="card-sub">Maintenance</span>
            </div>
            <a href="tiers.html" class="nav-card" style="border-color:var(--primary); background:rgba(255,0,60,0.05);">
                <span class="card-main">TIERS</span>
                <span class="card-sub" style="color:#00ff88">LIVE ENTRY</span>
            </a>
            <div class="nav-card" onclick="alert('Discord Node Encrypted')">
                <span class="card-main">SOCIAL</span>
                <span class="card-sub">Encrypted</span>
            </div>
        </div>
    </main>
</body>
</html>
